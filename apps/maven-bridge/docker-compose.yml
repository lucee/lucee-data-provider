services:
  maven-bridge:
    build: .
    image: lucee-maven-bridge:latest
    environment:
      EXTENSION_PROVIDERS: "https://www.forgebox.io|io.forgebox,https://extension.lucee.org|org.lucee|https://cdn.lucee.org/"
      CACHE_TTL_MINUTES: "60"
      TIMEOUT: "300"
      LUCEE_ADMIN_PASSWORD: "change-me"
    volumes:
      - "./www:/var/www"
    ports:
      - "8856:8080"

# Maven repo base URL: http://localhost:8856/
# Pipe format: providerUrl|groupId|upstreamMavenRepo (upstream optional)
# "https://www.forgebox.io|io.forgebox,https://extension.lucee.org|org.lucee|https://cdn.lucee.org/"